backend:
  name: git-gateway
  branch: main

media_folder: ""
public_folder: "/"

locale: "pt"

collections:
  - name: "home"
    label: "Página Inicial"
    files:
      - name: "home"
        label: "Conteúdo da Home"
        file: "content/home.json"
        fields:
          - label: "Topo (Hero)"
            name: hero
            widget: object
            fields:
              - { label: "Selo pequeno acima do título", name: tag, widget: string }
              - { label: "Título principal", name: title, widget: text, hint: "Aperte Enter para quebrar linha. Use *palavra* para deixar em itálico." }
              - { label: "Subtítulo", name: subtitle, widget: string }
              - { label: "Texto de descrição", name: desc, widget: text }
              - { label: "Texto do botão", name: ctaText, widget: string }
          - label: "Seção Sobre"
            name: about
            widget: object
            fields:
              - { label: "Selo pequeno", name: label, widget: string }
              - { label: "Título", name: title, widget: text, hint: "Enter quebra linha. *palavra* fica em itálico." }
              - { label: "Texto", name: text, widget: text }
          - label: "Números (estatísticas)"
            name: stats
            widget: list
            fields:
              - { label: "Número", name: number, widget: string }
              - { label: "Legenda", name: label, widget: string }
          - label: "Fundadora"
            name: founder
            widget: object
            fields:
              - { label: "Foto", name: photo, widget: image }
              - { label: "Número do selo (ex: 9+)", name: badgeNumber, widget: string }
              - { label: "Legenda do selo (ex: anos)", name: badgeLabel, widget: string }
              - { label: "Selo pequeno", name: label, widget: string }
              - { label: "Nome", name: name, widget: string, hint: "Use *sobrenome* para deixar em itálico." }
              - { label: "Cargo/função", name: role, widget: string }
              - { label: "Biografia — parágrafo 1", name: bio1, widget: text }
              - { label: "Biografia — parágrafo 2", name: bio2, widget: text }
              - { label: "Pilares/especialidades", name: pillars, widget: list }
          - label: "Seção Serviços"
            name: services
            widget: object
            fields:
              - { label: "Selo pequeno", name: label, widget: string }
              - { label: "Título", name: title, widget: text, hint: "*palavra* fica em itálico." }
              - { label: "Texto do contador (ex: 08 práticas)", name: count, widget: string }
              - label: "Cards de serviço"
                name: items
                widget: list
                fields:
                  - { label: "Ícone (não mexer)", name: icon, widget: hidden }
                  - { label: "Categoria pequena", name: tag, widget: string }
                  - { label: "Título", name: title, widget: string, hint: "Enter quebra linha." }
                  - { label: "Descrição", name: desc, widget: text }
                  - { label: "Texto do link", name: linkText, widget: hidden }
                  - { label: "Link (não mexer)", name: href, widget: hidden }
          - label: "Depoimentos"
            name: testimonials
            widget: object
            fields:
              - { label: "Selo pequeno", name: label, widget: string }
              - { label: "Título", name: title, widget: text, hint: "*palavra* fica em itálico." }
              - label: "Depoimentos"
                name: items
                widget: list
                fields:
                  - { label: "Depoimento", name: quote, widget: text }
                  - { label: "Autor(a)", name: author, widget: string }
          - label: "Carrossel de fotos"
            name: carousel
            widget: list
            field: { label: "Foto", name: image, widget: image }
          - label: "Seção Contato"
            name: contact
            widget: object
            fields:
              - { label: "Selo pequeno", name: label, widget: string }
              - { label: "Título", name: title, widget: text, hint: "Enter quebra linha. *palavra* fica em itálico." }
              - { label: "Texto", name: text, widget: text }
              - { label: "Texto do botão WhatsApp", name: ctaText, widget: string }
              - label: "Informações de contato"
                name: info
                widget: list
                fields:
                  - { label: "Rótulo (ex: Instagram)", name: label, widget: string }
                  - { label: "Valor", name: value, widget: string }
          - label: "Rodapé"
            name: footer
            widget: object
            fields:
              - { label: "Nome no rodapé", name: logo, widget: string }
              - { label: "Texto de copyright", name: copy, widget: string }

  - name: "paginas-servico"
