              - { label: "Selo pequeno", name: label, widget: string }
              - { label: "Título", name: title, widget: text, hint: "*palavra* fica em itálico." }
              - label: "Itens"
                name: items
                widget: list
                fields:
                  - { label: "Número (ex: 01)", name: number, widget: string }
                  - { label: "Título", name: title, widget: string }
                  - { label: "Texto", name: text, widget: text }
          - label: "Depoimentos"
            name: testimonials
