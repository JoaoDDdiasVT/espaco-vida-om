                  - { label: "Preço", name: price, widget: string }
                  - { label: "Período", name: period, widget: string }
                  - { label: "Detalhe 1", name: detail1, widget: string, required: false }
                  - { label: "Detalhe 2", name: detail2, widget: string, required: false }
                  - { label: "Detalhe 3", name: detail3, widget: string, required: false }
          - label: "Chamada final (CTA)"
            name: cta
